run:
  outputs_dir: outputs
  max_workers: 2

energy:
  expressions_sheet: "ExpressionsMapping"
  framework_sheet: "Inner energy Framework"
  # Map Excel column names -> internal names (for Souli_EnergyFramework_PW (1).xlsx format)
  expr_column_map:
    "Main Question": "Problem statement"
    "Category": "Aspects of Woman Track"
    "Related Inner Issues": "deeper_blocks/ pshychlogical issues"
    "Reality Commitment Check": "Duality Check"
  required_expr_cols:
    - "Problem statement"
    - "Aspects of Woman Track"
    - "Duality Check"
    - "deeper_blocks/ pshychlogical issues"
    - "energy_node/energy block behind it/ inner block"
  framework_key_col: "energy_node"
  framework_cols:
    - "typical_signs"
    - "primary_healing_principles"
    - "primary_practices ( 7 min quick relief)"
    - "deeper_meditations_program ( 7 day quick recovery)"
    - "longer_program ( 7 month resilience building)"
    - "Caution"
    - "Health"
  aspects_allowed:
    - "Personal Life"
    - "Professional Work"
    - "Family"
    - "Parenting"
    - "Relationships & safety"
    - "Body/Health"
    - "Self, emotions & inner world"
    - "Life roles & responsibilities"
    - "Life transitions and losses"
    - "Digital Life & Modern Pressures"
    - "Unknown"
  nodes_allowed:
    - "blocked_energy"
    - "depleted_energy"
    - "normal_energy"
    - "outofcontrol_energy"
    - "scattered_energy"
  gates:
    min_problem_len: 12
    min_duality_len: 25
    min_blocks_len: 8
    min_blocks_count: 2

youtube:
  caption_langs: "en,hi"
  whisper_model: "medium"
  chunking:
    max_seconds: 55
    max_words: 220
    max_gap: 1.3
    min_words_to_split: 35
  segments:
    min_dur: 0.35
    min_words: 2
    max_gap: 0.20
  cleaning:
    overlap_words: 20
  classify:
    min_words_noise: 25
    min_words_teaching: 30
  scoring:
    meaning_min_score: 3
    junk_drop_threshold: 7

# LLM adapter for teaching card extraction (optional, disabled by default)
# Switch adapter to "ollama" to use local Ollama for card extraction
llm:
  enabled: false
  adapter: "none"   # "none" | "http_json" | "ollama"
  http_json:
    endpoint: "https://YOUR-ENDPOINT"
    timeout_s: 60
  ollama:
    model: "llama3.1"
    endpoint: "http://localhost:11434"
    timeout_s: 120
    temperature: 0.7
    num_ctx: 4096

# Local-only retrieval via Qdrant + sentence-transformers. No data leaves your machine.
retrieval:
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  top_k_teaching: 5
  qdrant_host: "localhost"
  qdrant_port: 6333
  qdrant_collection: "souli_chunks_improved"

# Conversation engine settings (Ollama llama3.1 + Qwen tagger)
conversation:
  # Main counselor model (Ollama)
  chat_model: "llama3.1"
  # Small fast model for energy node tagging of YouTube chunks
  tagger_model: "qwen2.5:1.5b"
  ollama_endpoint: "http://localhost:11434"
  # Number of YouTube RAG chunks to inject into each counselor response
  rag_top_k: 3
  # How many turns before nudging user toward solution/venting choice
  max_intake_turns: 4
  temperature: 0.75
  use_multi_collections: true    

multi_ingestion:
  # General semantic collection (shared with improved pipeline)
  general_collection: "souli_chunks_improved"
 
  # 5 typed specialist collections — one per content type
  healing_collection:    "souli_healing"
  activities_collection: "souli_activities"
  stories_collection:    "souli_stories"
  commitment_collection: "souli_commitment"
  patterns_collection:   "souli_patterns"
 
  # How long to wait for each extractor LLM call (seconds)
  # Increase if you have long videos and a slow machine
  extractor_timeout_s: 600
 
  # Minimum keyword hits for density fallback to mark a type as "rich"
  # (only used when Ollama is unavailable)
  density_keyword_threshold: 3

# Voice pipeline (LiveKit + STT + TTS)
voice:
  livekit_url: "ws://localhost:7880"
  livekit_api_key: "devkey"
  livekit_api_secret: "secret"
  room_name: "souli-room"
  # STT: "whisper" (local, no API key) | "deepgram" (cloud, needs DEEPGRAM_API_KEY)
  stt_provider: "whisper"
  whisper_model: "base"
  # TTS: "edge_tts" (free Microsoft) | "piper" (fully local)
  tts_provider: "edge_tts"
  # Indian English female voice — warm and natural
  tts_voice: "en-IN-NeerjaNeural"

