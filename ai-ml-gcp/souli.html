<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Souli — Your Companion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;1,400&display=swap"
        rel="stylesheet" />
    <style>
        /* ── Brand tokens ── */
        :root {
            --aqua: #2FC3C7;
            --teal: #68CBCC;
            --mist: #D8F2F2;
            --purple: #A88BEB;
            --gray: #2E2E2E;
            --offwhite: #F9FAFA;
            --slate: #475569;
            --border: #e2e8f0;
            --white: #ffffff;
            --radius: 12px;
            --shadow: 0 2px 12px rgba(47, 195, 199, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Lato', sans-serif;
            background: var(--offwhite);
            color: var(--gray);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        header {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow);
            flex-shrink: 0;
        }

        .logo-dot {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--aqua), var(--purple));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            color: var(--gray);
            letter-spacing: -0.3px;
        }

        header h1 span {
            color: var(--aqua);
            font-style: italic;
        }

        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #94a3b8;
            transition: background 0.3s;
        }

        .status-dot.ok {
            background: #22c55e;
        }

        .status-dot.err {
            background: #ef4444;
        }

        .status-label {
            font-size: 12px;
            color: var(--slate);
        }

        /* ── Tabs ── */
        .tabs {
            display: flex;
            background: var(--white);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            font-family: 'Lato', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--slate);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: var(--aqua);
            border-bottom-color: var(--aqua);
        }

        .tab-btn:hover:not(.active) {
            background: var(--mist);
        }

        /* ── Layout ── */
        .app-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .log-panel {
            width: 300px;
            background: var(--white);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
        }

        .log-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            font-weight: 700;
            color: var(--slate);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .log-clear {
            font-size: 11px;
            color: var(--aqua);
            cursor: pointer;
            font-weight: 400;
            text-transform: none;
            letter-spacing: 0;
            background: none;
            border: none;
        }

        .log-entries {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            color: var(--slate);
        }

        .log-entry {
            padding: 6px 8px;
            border-radius: 6px;
            margin-bottom: 4px;
            border-left: 3px solid transparent;
            line-height: 1.4;
            word-break: break-word;
        }

        .log-entry.info {
            background: #f0f9ff;
            border-left-color: #60a5fa;
        }

        .log-entry.ok {
            background: #f0fdf4;
            border-left-color: #22c55e;
        }

        .log-entry.warn {
            background: #fff7ed;
            border-left-color: #fb923c;
        }

        .log-entry.error {
            background: #fef2f2;
            border-left-color: #ef4444;
        }

        .log-time {
            color: #94a3b8;
            font-size: 10px;
        }

        /* ── Session info ── */
        .session-bar {
            padding: 8px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .session-chip {
            font-size: 11px;
            background: var(--mist);
            color: var(--gray);
            padding: 3px 10px;
            border-radius: 20px;
            display: flex;
            gap: 4px;
        }

        .session-chip span {
            color: var(--aqua);
            font-weight: 700;
        }

        /* ── Messages ── */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .msg {
            display: flex;
            gap: 10px;
            max-width: 78%;
            animation: fadeUp 0.3s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .avatar.souli {
            background: linear-gradient(135deg, var(--aqua), var(--purple));
        }

        .avatar.user {
            background: var(--mist);
            font-size: 16px;
        }

        .bubble {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 16px;
            font-size: 14.5px;
            line-height: 1.6;
            color: var(--gray);
            box-shadow: var(--shadow);
        }

        .msg.user .bubble {
            background: linear-gradient(135deg, var(--aqua), var(--teal));
            color: white;
            border-color: transparent;
        }

        .audio-player {
            margin-top: 8px;
            width: 100%;
        }

        audio {
            width: 100%;
            height: 32px;
        }

        /* ── Transcript badge ── */
        .transcript-badge {
            font-size: 11px;
            color: var(--slate);
            background: var(--mist);
            padding: 3px 8px;
            border-radius: 4px;
            margin-top: 6px;
            display: inline-block;
        }

        /* ── Input row (text) ── */
        .input-row {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            background: var(--white);
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-row textarea {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 14px;
            font-family: 'Lato', sans-serif;
            font-size: 14px;
            color: var(--gray);
            resize: none;
            outline: none;
            min-height: 42px;
            max-height: 120px;
            transition: border-color 0.2s;
            background: var(--offwhite);
        }

        .input-row textarea:focus {
            border-color: var(--aqua);
        }

        .send-btn {
            background: var(--aqua);
            color: white;
            border: none;
            border-radius: var(--radius);
            padding: 10px 20px;
            font-family: 'Lato', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        .send-btn:hover {
            background: var(--teal);
        }

        .send-btn:active {
            transform: scale(0.97);
        }

        .send-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        /* ── Voice tab ── */
        .voice-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px;
            gap: 20px;
        }

        .voice-messages {
            flex: 1;
            overflow-y: auto;
            width: 100%;
            max-width: 640px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 8px;
        }

        .mic-ring {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: var(--mist);
            border: 3px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .mic-ring:hover {
            background: var(--mist);
            border-color: var(--aqua);
        }

        .mic-ring.recording {
            background: #fef2f2;
            border-color: #ef4444;
            animation: pulse 1s infinite;
        }

        .mic-ring.processing {
            background: #fefce8;
            border-color: #eab308;
            cursor: wait;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.3);
            }

            70% {
                box-shadow: 0 0 0 14px rgba(239, 68, 68, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
            }
        }

        .mic-icon {
            font-size: 36px;
        }

        .mic-label {
            font-size: 13px;
            color: var(--slate);
            text-align: center;
        }

        .voice-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .stop-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 24px;
            border-radius: 20px;
            font-family: 'Lato', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: none;
        }

        .stop-btn.visible {
            display: block;
        }

        /* ── Thinking indicator ── */
        .thinking {
            display: flex;
            gap: 5px;
            align-items: center;
            padding: 6px 0;
        }

        .thinking span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--aqua);
            animation: bounce 1.2s infinite;
        }

        .thinking span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .thinking span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0.6);
                opacity: 0.4;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--gray);
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
        }

        .toast.err {
            background: #ef4444;
        }

        .toast.ok {
            background: #22c55e;
        }

        /* ── Reset btn ── */
        .reset-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--slate);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-family: 'Lato', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            border-color: var(--aqua);
            color: var(--aqua);
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 99px;
        }

        /* ── Hidden tab content ── */
        .tab-content {
            display: none;
            flex: 1;
            overflow: hidden;
            flex-direction: column;
        }

        .tab-content.active {
            display: flex;
        }

        /* voice tab wrapper */
        #tab-voice .chat-panel {
            align-items: center;
        }
    </style>
</head>

<body>

    <!-- ── Header ── -->
    <header>
        <div class="logo-dot">🌊</div>
        <h1>Sou<span>li</span></h1>
        <div class="header-right">
            <div class="status-dot" id="statusDot"></div>
            <span class="status-label" id="statusLabel">Checking…</span>
            <button class="reset-btn" onclick="resetSession()">↺ New Session</button>
        </div>
    </header>

    <!-- ── Tabs ── -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('text')" id="tabBtn-text">💬 Text Chat</button>
        <button class="tab-btn" onclick="switchTab('voice')" id="tabBtn-voice">🎙️ Voice Chat</button>
    </div>

    <!-- ── Body ── -->
    <div class="app-body">

        <!-- ════ TEXT TAB ════ -->
        <div class="tab-content active" id="tab-text">
            <div class="chat-panel">
                <div class="session-bar" id="sessionBarText">
                    <div class="session-chip">Session <span id="sessionIdShort">—</span></div>
                    <div class="session-chip">Phase <span id="phaseText">—</span></div>
                    <div class="session-chip">Turns <span id="turnsText">0</span></div>
                    <div class="session-chip">Node <span id="nodeText">—</span></div>
                </div>
                <div class="messages" id="textMessages"></div>
                <div class="input-row">
                    <textarea id="textInput" placeholder="Share what's on your mind…" rows="1"
                        onkeydown="handleKey(event)"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendText()">Send</button>
                </div>
            </div>
        </div>

        <!-- ════ VOICE TAB ════ -->
        <div class="tab-content" id="tab-voice">
            <div class="chat-panel">
                <div class="session-bar">
                    <div class="session-chip">Session <span id="sessionIdShortV">—</span></div>
                    <div class="session-chip">Phase <span id="phaseVoice">—</span></div>
                    <div class="session-chip">Turns <span id="turnsVoice">0</span></div>
                </div>
                <div class="voice-messages messages" id="voiceMessages" style="max-width:100%;"></div>
                <div class="voice-panel" style="flex-shrink:0; padding-top:12px;">
                    <div class="voice-controls">
                        <div class="mic-ring" id="micRing" onclick="toggleRecording()">
                            <span class="mic-icon" id="micIcon">🎙️</span>
                        </div>
                        <div class="mic-label" id="micLabel">Tap to speak</div>
                        <button class="stop-btn" id="stopBtn" onclick="stopRecording()">■ Stop Recording</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ════ LOG PANEL ════ -->
        <div class="log-panel">
            <div class="log-header">
                Activity Log
                <button class="log-clear" onclick="clearLog()">Clear</button>
            </div>
            <div class="log-entries" id="logEntries"></div>
        </div>

    </div>

    <!-- ── Toast ── -->
    <div class="toast" id="toast"></div>

    <script>
        // ════════════════════════════════════════════════════════════
        // CONFIG
        // ════════════════════════════════════════════════════════════
        const API = 'http://35.200.231.7:8503';

        // ════════════════════════════════════════════════════════════
        // STATE  (all vars declared first, before any function runs)
        // ════════════════════════════════════════════════════════════
        var SESSION_ID = '';   // filled in on boot below
        var isRecording = false;
        var mediaRecorder = null;
        var audioChunks = [];
        var isBusy = false;

        function initSession() {
            try {
                var stored = localStorage.getItem('souli_session');
                SESSION_ID = stored || (crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36));
                localStorage.setItem('souli_session', SESSION_ID);
            } catch (e) {
                // localStorage blocked (file:// in strict mode) — use in-memory ID
                SESSION_ID = Date.now().toString(36) + Math.random().toString(36);
            }
        }

        // ════════════════════════════════════════════════════════════
        // LOG
        // ════════════════════════════════════════════════════════════
        function log(msg, level = 'info') {
            const el = document.getElementById('logEntries');
            const now = new Date();
            const time = now.toLocaleTimeString('en-IN', { hour12: false });
            const div = document.createElement('div');
            div.className = `log-entry ${level}`;
            div.innerHTML = `<div class="log-time">${time}</div>${msg}`;
            el.appendChild(div);
            el.scrollTop = el.scrollHeight;
            console.log(`[${level.toUpperCase()}] ${msg}`);
        }

        function clearLog() {
            document.getElementById('logEntries').innerHTML = '';
        }

        // ════════════════════════════════════════════════════════════
        // TOAST
        // ════════════════════════════════════════════════════════════
        function toast(msg, type = '') {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = `toast show ${type}`;
            setTimeout(() => el.className = 'toast', 2800);
        }

        // ════════════════════════════════════════════════════════════
        // SESSION UI
        // ════════════════════════════════════════════════════════════
        function updateSessionUI(phase, turns, node) {
            const short = SESSION_ID.slice(0, 8) + '…';
            document.getElementById('sessionIdShort').textContent = short;
            document.getElementById('sessionIdShortV').textContent = short;
            if (phase) {
                document.getElementById('phaseText').textContent = phase;
                document.getElementById('phaseVoice').textContent = phase;
            }
            if (turns !== undefined) {
                document.getElementById('turnsText').textContent = turns;
                document.getElementById('turnsVoice').textContent = turns;
            }
            if (node) document.getElementById('nodeText').textContent = node || '—';
        }

        // ════════════════════════════════════════════════════════════
        // HEALTH CHECK
        // ════════════════════════════════════════════════════════════
        async function checkHealth() {
            try {
                // Use /session/greeting as a lightweight ping — /health endpoint not available
                const fd = new FormData();
                fd.append('session_id', 'healthcheck-ping');
                const r = await fetch(`${API}/session/greeting`, {
                    method: 'POST',
                    body: fd,
                    signal: AbortSignal.timeout(6000)
                });
                const dot = document.getElementById('statusDot');
                const lbl = document.getElementById('statusLabel');
                if (r.ok) {
                    dot.className = 'status-dot ok';
                    lbl.textContent = 'API Online';
                    log('✅ FastAPI backend is reachable at ' + API, 'ok');
                } else {
                    dot.className = 'status-dot err';
                    lbl.textContent = `API ${r.status}`;
                    log(`⚠️ API returned ${r.status}`, 'warn');
                }
            } catch (e) {
                document.getElementById('statusDot').className = 'status-dot err';
                document.getElementById('statusLabel').textContent = 'API Offline';
                log(`❌ Cannot reach API at ${API} — is FastAPI running? (${e.message})`, 'error');
            }
        }

        // ════════════════════════════════════════════════════════════
        // GREETING
        // ════════════════════════════════════════════════════════════
        async function loadGreeting() {
            log('Fetching greeting for session ' + SESSION_ID.slice(0, 8) + '…');
            try {
                const fd = new FormData();
                fd.append('session_id', SESSION_ID);
                const r = await fetch(`${API}/session/greeting`, { method: 'POST', body: fd });
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                const data = await r.json();
                const greeting = data.greeting || data.reply || 'Hello, I\'m Souli. How are you feeling today?';
                appendMsg('text', 'souli', greeting);
                appendMsg('voice', 'souli', greeting);
                log('Greeting loaded ✓', 'ok');
            } catch (e) {
                const fallback = "Hello, I'm Souli. I'm here with you. How are you feeling today?";
                appendMsg('text', 'souli', fallback);
                appendMsg('voice', 'souli', fallback);
                log(`Greeting fetch failed (${e.message}) — using fallback`, 'warn');
            }
            updateSessionUI('—', 0, '—');
        }

        // ════════════════════════════════════════════════════════════
        // TABS
        // ════════════════════════════════════════════════════════════
        function switchTab(name) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${name}`).classList.add('active');
            document.getElementById(`tabBtn-${name}`).classList.add('active');
        }

        // ════════════════════════════════════════════════════════════
        // MESSAGE RENDERING
        // ════════════════════════════════════════════════════════════
        function appendMsg(panel, role, text, audioBlob = null, transcript = null) {
            const container = document.getElementById(panel === 'text' ? 'textMessages' : 'voiceMessages');
            const wrap = document.createElement('div');
            wrap.className = `msg ${role}`;

            const avatar = document.createElement('div');
            avatar.className = `avatar ${role}`;
            avatar.textContent = role === 'souli' ? '🌊' : '🧑';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.style.maxWidth = '100%';

            const textNode = document.createElement('p');
            textNode.textContent = text;
            bubble.appendChild(textNode);

            if (transcript) {
                const badge = document.createElement('div');
                badge.className = 'transcript-badge';
                badge.textContent = '🎙️ You said: ' + transcript;
                bubble.appendChild(badge);
            }

            if (audioBlob) {
                const url = URL.createObjectURL(audioBlob);
                const audioWrap = document.createElement('div');
                audioWrap.className = 'audio-player';
                const audio = document.createElement('audio');
                audio.controls = true;
                audio.src = url;
                audio.autoplay = true;  // auto-play Souli's reply
                audioWrap.appendChild(audio);
                bubble.appendChild(audioWrap);
            }

            wrap.appendChild(avatar);
            wrap.appendChild(bubble);
            container.appendChild(wrap);
            container.scrollTop = container.scrollHeight;
        }

        function showThinking(panel) {
            const container = document.getElementById(panel === 'text' ? 'textMessages' : 'voiceMessages');
            const wrap = document.createElement('div');
            wrap.className = 'msg souli';
            wrap.id = panel + '-thinking';
            wrap.innerHTML = `
    <div class="avatar souli">🌊</div>
    <div class="bubble">
      <div class="thinking"><span></span><span></span><span></span></div>
    </div>`;
            container.appendChild(wrap);
            container.scrollTop = container.scrollHeight;
        }

        function removeThinking(panel) {
            const el = document.getElementById(panel + '-thinking');
            if (el) el.remove();
        }

        // ════════════════════════════════════════════════════════════
        // TEXT CHAT
        // ════════════════════════════════════════════════════════════
        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendText();
            }
        }

        async function sendText() {
            const input = document.getElementById('textInput');
            const msg = input.value.trim();
            if (!msg || isBusy) return;

            input.value = '';
            input.style.height = 'auto';
            appendMsg('text', 'user', msg);
            log(`→ User: "${msg.slice(0, 60)}${msg.length > 60 ? '…' : ''}"`);

            setBusy(true);
            showThinking('text');

            try {
                const body = JSON.stringify({ session_id: SESSION_ID, message: msg });
                log('POST /chat …');
                const start = Date.now();
                const r = await fetch(`${API}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body
                });

                if (!r.ok) {
                    const err = await r.text();
                    throw new Error(`HTTP ${r.status}: ${err.slice(0, 100)}`);
                }

                const data = await r.json();
                const ms = Date.now() - start;
                removeThinking('text');
                appendMsg('text', 'souli', data.reply);
                updateSessionUI(data.phase, data.turn_count, data.energy_node);
                log(`← Reply in ${ms}ms | phase=${data.phase} turns=${data.turn_count}`, 'ok');
            } catch (e) {
                removeThinking('text');
                appendMsg('text', 'souli', 'Sorry, something went wrong. Please try again.');
                log(`❌ /chat error: ${e.message}`, 'error');
                toast('Request failed — ' + e.message, 'err');
            } finally {
                setBusy(false);
            }
        }

        // ════════════════════════════════════════════════════════════
        // VOICE CHAT
        // ════════════════════════════════════════════════════════════
        async function toggleRecording() {
            if (isBusy) return;
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioChunks = [];
                mediaRecorder = new MediaRecorder(stream);

                mediaRecorder.ondataavailable = e => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };

                mediaRecorder.onstop = async () => {
                    stream.getTracks().forEach(t => t.stop());
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    log(`Recording stopped — size: ${(blob.size / 1024).toFixed(1)} KB`);
                    await sendVoice(blob);
                };

                mediaRecorder.start();
                isRecording = true;
                setMicState('recording');
                log('🎙️ Recording started…', 'info');
            } catch (e) {
                log(`❌ Mic access denied: ${e.message}`, 'error');
                toast('Microphone access denied', 'err');
            }
        }

        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                setMicState('processing');
            }
        }

        async function sendVoice(blob) {
            setBusy(true);
            showThinking('voice');
            log('POST /voice — sending audio…');

            const fd = new FormData();
            fd.append('session_id', SESSION_ID);
            fd.append('audio', blob, 'recording.webm');

            const start = Date.now();
            try {
                const r = await fetch(`${API}/voice`, { method: 'POST', body: fd });

                if (!r.ok) {
                    const errText = await r.text();
                    throw new Error(`HTTP ${r.status}: ${errText.slice(0, 100)}`);
                }

                // Read headers BEFORE consuming body
                const transcript = r.headers.get('X-Transcript') || '';
                const replyText = r.headers.get('X-Reply') || '';
                const phase = r.headers.get('X-Phase') || '';
                const turns = r.headers.get('X-Turn-Count') || '';
                const node = r.headers.get('X-Energy-Node') || '';

                // Body = MP3 audio
                const audioBlob = await r.blob();
                const ms = Date.now() - start;

                removeThinking('voice');

                // Show what user said
                if (transcript) {
                    appendMsg('voice', 'user', transcript);
                    log(`🎙️ Transcript: "${transcript.slice(0, 80)}…"`, 'ok');
                }

                // Show Souli's reply + audio
                appendMsg('voice', 'souli', replyText, audioBlob);
                updateSessionUI(phase, parseInt(turns) || undefined, node);

                log(`← Voice reply in ${ms}ms | phase=${phase} turns=${turns}`, 'ok');
                log(`💬 Reply: "${replyText.slice(0, 80)}${replyText.length > 80 ? '…' : ''}"`, 'info');

            } catch (e) {
                removeThinking('voice');
                appendMsg('voice', 'souli', 'Sorry, could not process that. Please try again.');
                log(`❌ /voice error: ${e.message}`, 'error');
                toast('Voice failed — ' + e.message, 'err');
            } finally {
                setBusy(false);
                setMicState('idle');
            }
        }

        // ════════════════════════════════════════════════════════════
        // SESSION RESET
        // ════════════════════════════════════════════════════════════
        async function resetSession() {
            if (!confirm('Start a fresh conversation? Current session will be cleared.')) return;

            log('Resetting session…');
            try {
                const fd = new FormData();
                fd.append('session_id', SESSION_ID);
                const r = await fetch(`${API}/session/reset`, { method: 'POST', body: fd });
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                const data = await r.json();
                log('Session reset ✓', 'ok');
                toast('Session reset — fresh start!', 'ok');

                // Clear messages
                document.getElementById('textMessages').innerHTML = '';
                document.getElementById('voiceMessages').innerHTML = '';

                const greeting = data.greeting || "Hello again. I'm here with you.";
                appendMsg('text', 'souli', greeting);
                appendMsg('voice', 'souli', greeting);
                updateSessionUI('—', 0, '—');
            } catch (e) {
                log(`❌ Reset failed: ${e.message}`, 'error');
                toast('Reset failed', 'err');
            }
        }

        // ════════════════════════════════════════════════════════════
        // UI STATE HELPERS
        // ════════════════════════════════════════════════════════════
        function setBusy(busy) {
            isBusy = busy;
            document.getElementById('sendBtn').disabled = busy;
        }

        function setMicState(state) {
            const ring = document.getElementById('micRing');
            const icon = document.getElementById('micIcon');
            const label = document.getElementById('micLabel');
            const stop = document.getElementById('stopBtn');

            ring.className = 'mic-ring ' + (state !== 'idle' ? state : '');

            if (state === 'recording') {
                icon.textContent = '⏺';
                label.textContent = 'Recording… tap to stop';
                stop.classList.add('visible');
            } else if (state === 'processing') {
                icon.textContent = '⏳';
                label.textContent = 'Processing…';
                stop.classList.remove('visible');
            } else {
                icon.textContent = '🎙️';
                label.textContent = 'Tap to speak';
                stop.classList.remove('visible');
            }
        }

        // Auto-grow textarea
        document.getElementById('textInput').addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // ════════════════════════════════════════════════════════════
        // BOOT
        // ════════════════════════════════════════════════════════════
        (async () => {
            initSession();   // MUST be first — sets SESSION_ID before anything else
            log('Souli UI initialising…');
            log('Session ID: ' + SESSION_ID);
            updateSessionUI('—', 0, '—');
            await checkHealth();
            await loadGreeting();
            log('Ready ✓', 'ok');
        })();
    </script>
</body>
