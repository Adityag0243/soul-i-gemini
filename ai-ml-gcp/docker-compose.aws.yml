# ─────────────────────────────────────────────────────────────────────────────
# Souli — AWS Docker Compose (runs on an EC2 instance with NVIDIA GPU)
#
# Services:
#   ollama      — Ollama LLM server (llama3.1 + qwen2.5:1.5b)
#   qdrant      — Qdrant vector store
#   souli       — Streamlit UI (port 8501)
#   souli-api   — FastAPI REST API for mobile app (port 8000)
#   souli-dev   — Dev Streamlit UI (port 8502)
#   livekit     — LiveKit SFU for voice rooms (optional)
#
# Usage on EC2:
#   docker compose -f docker-compose.aws.yml --env-file .env up -d
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

networks:
  souli-net:
    driver: bridge

volumes:
  ollama-models: # Persists pulled LLM models across container restarts
  qdrant-storage: # Persists Qdrant collection data
  souli-outputs: # Pipeline outputs (teaching_ready.xlsx, gold.xlsx, etc.)
  souli-data:
    # Input data (Excel, videos.csv)

    # ── Shared environment block (reused by both souli services) ──────────────────
x-souli-env: &souli-env
  OLLAMA_ENDPOINT: http://ollama:11434
  OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.1}
  OLLAMA_TAGGER_MODEL: ${OLLAMA_TAGGER_MODEL:-qwen2.5:1.5b}
  QDRANT_HOST: qdrant
  QDRANT_PORT: 6333
  QDRANT_COLLECTION: ${QDRANT_COLLECTION:-souli_chunks}
  LIVEKIT_URL: ${LIVEKIT_URL}
  LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
  LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
  LIVEKIT_ROOM: ${LIVEKIT_ROOM:-souli-room}
  SOULI_OUTPUTS_DIR: /app/outputs
  SOULI_LOG_LEVEL: ${SOULI_LOG_LEVEL:-INFO}
  SOULI_CONFIG_PATH: /app/configs/pipeline.aws.yaml

x-souli-volumes: &souli-volumes
  - souli-data:/app/data
  - souli-outputs:/app/outputs

services:

  # ── Ollama (LLM server) ────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: souli-ollama
    restart: unless-stopped
    networks:
      - souli-net
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/11434' || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Qdrant (vector store) ──────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: souli-qdrant
    restart: unless-stopped
    networks:
      - souli-net
    volumes:
      - qdrant-storage:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Souli Streamlit UI (port 8501) ─────────────────────────────────────────
  souli:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: souli-pipeline
    restart: unless-stopped
    networks:
      - souli-net
    depends_on:
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes: *souli-volumes
    environment:
      <<: *souli-env
    # ← This line tells Docker what to RUN for this service
    # command: [ "streamlit", "run", "/app/souli_pipeline/streamlit_app.py", "--server.port=8501", "--server.address=0.0.0.0" ]
    command: [ "streamlit", "run", "/app/app.py", "--server.port=8501", "--server.address=0.0.0.0" ]
    ports:
      - "8501:8501"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8501' || exit 1" ]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 30s

  # ── Souli FastAPI — REST API for mobile app (port 8000) ───────────────────
  # THIS IS THE NEW SERVICE your mobile backend team connects to
  souli-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: souli-api
    restart: unless-stopped
    networks:
      - souli-net
    depends_on:
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes: *souli-volumes
    environment:
      <<: *souli-env
    command: [ "gunicorn", "souli_pipeline.api:app", "--worker-class", "uvicorn.workers.UvicornWorker", "--workers", "3", "--bind", "0.0.0.0:8000", "--timeout", "120" ]
    ports:
      - "8000:8000" # Mobile app calls http://<EC2_PUBLIC_IP>:8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  souli-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: souli-dev-ui
    restart: unless-stopped
    networks:
      - souli-net
    depends_on:
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - souli-data:/app/data
      - souli-outputs:/app/outputs
    environment:
      - OLLAMA_ENDPOINT=http://ollama:11434
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-souli_chunks}
      - SOULI_LOG_LEVEL=DEBUG
      - TRANSFORMERS_VERBOSITY=error
    command: [ "streamlit", "run", "/app/souli_pipeline/streamlit_dev.py", "--server.port=8502", "--server.address=0.0.0.0" ]
    ports:
      - "8502:8502"

  # ── LiveKit SFU (self-hosted, optional) ───────────────────────────────────
  livekit:
    image: livekit/livekit-server:latest
    container_name: souli-livekit
    restart: unless-stopped
    networks:
      - souli-net
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50100-50200:50100-50200/udp"
    environment:
      - LIVEKIT_CONFIG_BODY=${LIVEKIT_CONFIG_BODY}
    volumes:
      - ./configs/livekit.yaml:/etc/livekit.yaml:ro
    command: [ "--config", "/etc/livekit.yaml" ]
    profiles:
      - livekit-selfhosted
