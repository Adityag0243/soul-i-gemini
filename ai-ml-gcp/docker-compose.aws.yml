# ─────────────────────────────────────────────────────────────────────────────
# Souli — AWS Docker Compose (runs on an EC2 instance with NVIDIA GPU)
#
# Services:
#   ollama        — Ollama LLM server (for energy tagger — qwen2.5:1.5b)
#   souli         — Streamlit UI (port 8501)
#   souli-api     — FastAPI REST API for mobile app (port 8000) — Gemini powered
#   souli-dev     — Dev Streamlit UI (port 8502) — Gemini toggle
#   souli-voice   — LiveKit voice worker — Gemini + Deepgram
#   livekit       — Self-hosted LiveKit SFU (optional, use livekit-selfhosted profile)
#
# Usage on EC2:
#   docker compose -f docker-compose.aws.yml --env-file .env up -d
#
# Before first run — authenticate Gemini on the host machine (once):
#   gcloud auth application-default login
#   gcloud auth application-default set-quota-project YOUR_GCP_PROJECT_ID
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

networks:
  souli-net:
    driver: bridge

volumes:
  ollama-models:    # Persists pulled LLM models across container restarts
  souli-outputs:    # Pipeline outputs
  souli-data:       # Input data (Excel, videos.csv)

# ── Shared environment block ──────────────────────────────────────────────────
x-souli-env: &souli-env
  # Ollama (used only for energy tagger — qwen2.5:1.5b)
  OLLAMA_ENDPOINT: http://ollama:11434
  OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.1}
  OLLAMA_TAGGER_MODEL: ${OLLAMA_TAGGER_MODEL:-qwen2.5:1.5b}
  # Qdrant Cloud
  QDRANT_HOST: ${QDRANT_HOST}
  QDRANT_PORT: ${QDRANT_PORT:-6333}
  QDRANT_API_KEY: ${QDRANT_API_KEY}
  QDRANT_COLLECTION: ${QDRANT_COLLECTION:-souli_chunks_improved}
  # LiveKit
  LIVEKIT_URL: ${LIVEKIT_URL}
  LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
  LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
  LIVEKIT_ROOM: ${LIVEKIT_ROOM:-souli-room}
  # Gemini (Vertex AI)
  GCP_PROJECT_ID: ${GCP_PROJECT_ID}
  GCP_LOCATION: ${GCP_LOCATION:-us-central1}
  GOOGLE_APPLICATION_CREDENTIALS: /root/.config/gcloud/application_default_credentials.json
  GEMINI_FLASH_MODEL: ${GEMINI_FLASH_MODEL:-gemini-3-flash-preview}
  GEMINI_PRO_MODEL: ${GEMINI_PRO_MODEL:-gemini-3-pro-preview}
  # MongoDB Atlas
  MONGODB_ATLAS_URI: ${MONGODB_ATLAS_URI}
  MONGODB_DB_NAME: ${MONGODB_DB_NAME:-souli_benchmark}
  # Deepgram STT
  DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
  # TTS
  TTS_VOICE: ${TTS_VOICE:-en-IN-NeerjaNeural}
  # General
  SOULI_OUTPUTS_DIR: /app/outputs
  SOULI_LOG_LEVEL: ${SOULI_LOG_LEVEL:-INFO}
  SOULI_CONFIG_PATH: /app/configs/pipeline.aws.yaml
  TRANSFORMERS_VERBOSITY: error

# ── Shared volumes block ──────────────────────────────────────────────────────
x-souli-volumes: &souli-volumes
  - souli-data:/app/data
  - souli-outputs:/app/outputs
  - ${GCLOUD_CONFIG_DIR:-/home/ubuntu/.config/gcloud}:/root/.config/gcloud:ro

services:

  # ── Ollama (LLM server — used only for Qwen energy tagger) ────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: souli-ollama
    restart: unless-stopped
    networks:
      - souli-net
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/11434' || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Souli Streamlit UI (port 8501) ─────────────────────────────────────────
  souli:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: souli-pipeline
    restart: unless-stopped
    networks:
      - souli-net
    depends_on:
      ollama:
        condition: service_healthy
    volumes: *souli-volumes
    environment:
      <<: *souli-env
    command: [ "streamlit", "run", "/app/app.py", "--server.port=8501", "--server.address=0.0.0.0" ]
    ports:
      - "8501:8501"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8501' || exit 1" ]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 30s

  # ── Souli FastAPI — REST API for mobile app (port 8000) ───────────────────
  souli-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: souli-api
    restart: unless-stopped
    networks:
      - souli-net
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - souli-data:/app/data
      - souli-outputs:/app/outputs
      - ${GCLOUD_CONFIG_DIR:-/home/ubuntu/.config/gcloud}:/root/.config/gcloud:ro
    environment:
      <<: *souli-env
    command: [ "gunicorn", "souli_pipeline.api:app", "--worker-class", "uvicorn.workers.UvicornWorker", "--workers", "3", "--bind", "0.0.0.0:8000", "--timeout", "120" ]
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Souli Dev UI (port 8502) ──────────────────────────────────────────────
  souli-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: souli-dev-ui
    restart: unless-stopped
    networks:
      - souli-net
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - souli-data:/app/data
      - souli-outputs:/app/outputs
      - ${GCLOUD_CONFIG_DIR:-/home/ubuntu/.config/gcloud}:/root/.config/gcloud:ro
    environment:
      <<: *souli-env
      SOULI_LOG_LEVEL: DEBUG
    command: [ "streamlit", "run", "/app/souli_pipeline/streamlit_dev.py", "--server.port=8502", "--server.address=0.0.0.0" ]
    ports:
      - "8502:8502"

  # ── Souli Voice Worker (LiveKit + Gemini + Deepgram) ──────────────────────
  souli-voice:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: souli-voice-worker
    restart: unless-stopped
    networks:
      - souli-net
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - souli-data:/app/data
      - souli-outputs:/app/outputs
      - ${GCLOUD_CONFIG_DIR:-/home/ubuntu/.config/gcloud}:/root/.config/gcloud:ro
    environment:
      <<: *souli-env
    command: [ "python", "-m", "souli_pipeline.voice.run_worker" ]

  # ── LiveKit SFU (self-hosted, optional) ───────────────────────────────────
  livekit:
    image: livekit/livekit-server:latest
    container_name: souli-livekit
    restart: unless-stopped
    networks:
      - souli-net
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50100-50200:50100-50200/udp"
    environment:
      - LIVEKIT_CONFIG_BODY=${LIVEKIT_CONFIG_BODY}
    volumes:
      - ./configs/livekit.yaml:/etc/livekit.yaml:ro
    command: [ "--config", "/etc/livekit.yaml" ]
    profiles:
      - livekit-selfhosted

  # ── Ollama Model Puller (runs once, pulls required models) ────────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: souli-ollama-init
    networks:
      - souli-net
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama-models:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Pulling llama3.1..."
        ollama pull llama3.1
        echo "Pulling qwen2.5:1.5b..."
        ollama pull qwen2.5:1.5b
        echo "All models ready!"
    environment:
      - OLLAMA_HOST=ollama:11434
    restart: "no"